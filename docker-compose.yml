services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: driftwood
      POSTGRES_USER: driftwood
      POSTGRES_PASSWORD: driftwood
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driftwood"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
